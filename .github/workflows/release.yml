name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version increment (major, minor, patch) or explicit version (e.g. 1.2.3)'
        required: true
        default: 'patch'
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, tag, and push
        id: release
        run: |
          npx release-it ${{ inputs.version }} --ci
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Released version: ${VERSION}"
          ls -la envaware-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.release.outputs.version }}" \
            "envaware-v${{ steps.release.outputs.version }}.zip" \
            --title "v${{ steps.release.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
