<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnvAware</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/popup.css">
</head>

<body>
    <div class="header">
        <h1>EnvAware</h1>
        <label class="switch" title="Enable Watermark">
            <input type="checkbox" id="enableToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <div class="form-group">
            <label for="watermarkText">Watermark Text</label>
            <input type="text" id="watermarkText" placeholder="e.g. LOCAL ENV">
            <div class="presets-section">
                <div class="presets-header">
                    <label>Quick Presets</label>
                    <button class="add-preset-btn" id="addPresetToggle">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add
                    </button>
                </div>
                <div class="presets-grid" id="presetsGrid"></div>
                <div class="preset-form" id="presetForm">
                    <div class="preset-form-row">
                        <div class="preset-form-field preset-form-field--name">
                            <label>Name</label>
                            <input type="text" id="newPresetName" placeholder="e.g. QA">
                        </div>
                        <div class="preset-form-field preset-form-field--color">
                            <label>Color</label>
                            <input type="color" id="newPresetColor" value="#8b5cf6">
                        </div>
                    </div>
                    <div class="preset-form-actions">
                        <button class="preset-cancel-btn" id="presetCancelBtn">Cancel</button>
                        <button class="preset-save-btn" id="presetSaveBtn">Save Preset</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="form-group">
            <div class="switch-row">
                <label for="addTitlePrefix">Add to Tab Title</label>
                <label class="switch">
                    <input type="checkbox" id="addTitlePrefix">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="textColor">Text Color</label>
            <div class="color-input-wrapper">
                <input type="color" id="textColor" value="#FF0000">
                <span id="colorValue" class="value-display value-display--left">#FF0000</span>
            </div>
        </div>

        <div class="form-group">
            <label for="textSize">Size (px)</label>
            <div class="slider-container">
                <input type="range" id="textSize" min="12" max="100" value="48">
                <span class="value-display" id="textSizeValue">48px</span>
            </div>
        </div>

        <div class="form-group">
            <label for="textSpacing">Spacing</label>
            <div class="slider-container">
                <input type="range" id="textSpacing" min="100" max="800" value="300" step="10">
                <span class="value-display" id="textSpacingValue">300</span>
            </div>
        </div>

        <div class="form-group">
            <label for="textOpacity">Opacity</label>
            <div class="slider-container">
                <input type="range" id="textOpacity" min="0.05" max="1" step="0.05" value="0.3">
                <span class="value-display" id="textOpacityValue">0.3</span>
            </div>
        </div>
    </div>

    <div class="popup-footer-link">
        <a href="#" id="openOptions">Manage All Configurations</a>
    </div>

    <div class="footer">Corentin Bonjour – Avisto</div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/core.js"></script>
    <script src="js/popup.js"></script>
</body>

</html>
